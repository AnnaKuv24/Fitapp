# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# Override DB_URL/DB_USERNAME/DB_PASSWORD/JWT_SECRET via environment variables in production —
# the values below are local dev defaults only and must not be used outside development.
# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fitness_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:fitapp_user}
spring.datasource.password=${DB_PASSWORD:fitapp_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:fitapp-super-secret-key-256-bits-minimum-length-required-here-ok}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,https://annakuv24.github.io,https://*.lhr.life,https://*.serveousercontent.com,https://*.ngrok-free.app

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.fitapp=DEBUG
logging.level.org.springframework.security=WARN
