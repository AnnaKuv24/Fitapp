# ── Test profile: in-memory H2 instead of MySQL ───────────────────────────────
spring.datasource.url=jdbc:h2:mem:fitapp_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=test-only-secret-key-256-bits-minimum-length-required-here-ok
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

app.cors.allowed-origins=http://localhost:5500
